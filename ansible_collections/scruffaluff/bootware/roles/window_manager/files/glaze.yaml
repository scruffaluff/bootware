# GlazeWM configuration file for tiling windows.
#
# For more information, visit
# https://github.com/glzr-io/glazewm#config-documentation.

---
binding_modes: []

focus_borders:
  active:
    enabled: false
  inactive:
    enabled: false

gaps:
  inner_gap: 0px
  outer_gap:
    bottom: 4px
    left: 4px
    right: 4px
    top: 4px

general:
  focus_follows_cursor: true
  show_all_in_taskbar: true

keybindings:
  # Change focus to a workspace defined in the workspaces config.
  - bindings:
      - control+lwin+1
    commands:
      - focus --workspace 1
  - bindings:
      - control+lwin+2
    commands:
      - focus --workspace 2
  - bindings:
      - control+lwin+3
    commands:
      - focus --workspace 3
  - bindings:
      - control+lwin+4
    commands:
      - focus --workspace 4
  - bindings:
      - control+lwin+5
    commands:
      - focus --workspace 5
  - bindings:
      - control+lwin+6
    commands:
      - focus --workspace 6
  - bindings:
      - control+lwin+7
    commands:
      - focus --workspace 7
  - bindings:
      - control+lwin+8
    commands:
      - focus --workspace 8
  # Close focused window.
  - bindings:
      - lwin+shift+q
    commands:
      - close
  # Kill GlazeWM process safely.
  - bindings:
      - control+lwin+shift+q
    commands:
      - wm-exit
  # Re-evaluate configuration file.
  - bindings:
      - control+lwin+shift+r
    commands:
      - wm-reload-config
  # Change tiling direction for next new window.
  - bindings:
      - lwin+shift+oem_open_brackets
      - lwin+shift+oem_close_brackets
    commands:
      - toggle-tiling-direction
  # Change the focused window to be floating or tiling.
  - bindings:
      - lwin+shift+f
    commands:
      - toggle-floating --centered
  # Change focused window to be maximized or unmaximized.
  - bindings:
      - lwin+shift+m
    commands:
      - toggle-fullscreen
  # Shift focus in a given direction.
  - bindings:
      - lwin+shift+k
    commands:
      - focus --direction down
  - bindings:
      - lwin+shift+j
    commands:
      - focus --direction left
  - bindings:
      - lwin+shift+oem_semicolon
    commands:
      - focus --direction right
  - bindings:
      - lwin+shift+l
    commands:
      - focus --direction up
  # Move focused window in a given direction.
  - bindings:
      - lwin+shift+down
    commands:
      - move --direction down
  - bindings:
      - lwin+shift+left
    commands:
      - move --direction left
  - bindings:
      - lwin+shift+right
    commands:
      - move --direction right
  - bindings:
      - lwin+shift+up
    commands:
      - move --direction up
  # Shift focus --workspace in a give direction.
  - bindings:
      - control+lwin+oem_semicolon
    commands:
      - focus --next-active-workspace
  - bindings:
      - control+lwin+j
    commands:
      - focus --prev-active-workspace
  # Move focused workspace to a monitor in a given direction.
  - bindings:
      - control+lwin+left
    commands:
      - move --workspace 1
      - focus --workspace 1
  - bindings:
      - control+lwin+right
    commands:
      - move --workspace 2
      - focus --workspace 2
  # Move focused workspace to a monitor in a given direction.
  - bindings:
      - control+lwin+shift+left
    commands:
      - move-workspace --direction left
  - bindings:
      - control+lwin+shift+right
    commands:
      - move-workspace --direction right

workspaces:
  - keep_alive: true
    name: "1"
  - keep_alive: true
    name: "2"
  - keep_alive: true
    name: "3"
  - keep_alive: true
    name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
