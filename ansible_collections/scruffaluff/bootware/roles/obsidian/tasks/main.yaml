---
- name: Install Obsidian for Linux
  become: true
  community.general.flatpak:
    name: md.obsidian.Obsidian
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Install Obsidian for MacOS
  community.general.homebrew_cask:
    accept_external_apps: true
    name: obsidian
    state: present
  tags:
    - install
  when: ansible_facts.system == "Darwin"

- name: Install Obsidian for Windows
  community.windows.win_scoop:
    name: obsidian
  tags:
    - install
  when: ansible_facts.system == "Win32NT"

- name: Create Obsidian user settings directory for Unix
  ansible.builtin.file:
    dest: "{{ obsidian_user }}"
    group: "{{ group_id }}"
    mode: "755"
    owner: "{{ user_id }}"
    state: directory
  become: true
  tags:
    - config
  when: ansible_facts.system in ["Darwin", "Linux"]

- name: Create Obsidian user settings directory for Windows
  ansible.windows.win_file:
    path: "{{ obsidian_user }}"
    state: directory
  tags:
    - config
  when: ansible_facts.system == "Win32NT"

- name: Create Obsidian vault settings directory for Unix
  ansible.builtin.file:
    dest: "{{ obsidian_vault }}/.obsidian"
    group: "{{ group_id }}"
    mode: "755"
    owner: "{{ user_id }}"
    state: directory
  become: true
  tags:
    - config
  when: >-
    ansible_facts.system in ["Darwin", "Linux"] and obsidian_vault is defined

- name: Create Obsidian vault settings directory for Windows
  ansible.windows.win_file:
    path: "{{ obsidian_vault }}/.obsidian"
    state: directory
  tags:
    - config
  when: ansible_facts.system == "Win32NT" and obsidian_vault is defined

- name: Copy Obsidian vault settings files for Unix
  ansible.builtin.copy:
    dest: "{{ obsidian_vault }}/.obsidian/{{ item }}"
    force: true
    group: "{{ group_id }}"
    mode: "644"
    owner: "{{ user_id }}"
    src: "{{ item }}"
  become: true
  loop:
    - app.json
    - appearance.json
    - backlink.json
    - community-plugins.json
    - core-plugins.json
    - hotkeys.json
    - webviewer.json
  tags:
    - config
  when: >-
    ansible_facts.system in ["Darwin", "Linux"] and obsidian_vault is defined

- name: Copy Obsidian vault settings files for Windows
  ansible.windows.win_copy:
    dest: "{{ obsidian_vault }}/.obsidian/{{ item }}"
    force: true
    src: "{{ item }}"
  loop:
    - app.json
    - appearance.json
    - community-plugins.json
    - core-plugins.json
    - hotkeys.json
  tags:
    - config
  when: ansible_facts.system == "Win32NT" and obsidian_vault is defined

- name: Set owner of Obsidian files for Windows
  ansible.windows.win_owner:
    path: "{{ obsidian_vault }}"
    recurse: true
    user: "{{ user_id }}"
  tags:
    - config
  when: ansible_facts.system == "Win32NT" and obsidian_vault is defined
