---
- name: Install Jujutsu for FreeBSD
  become: true
  community.general.pkgng:
    name: jujutsu
  tags:
    - install
  when: ansible_facts.system == "FreeBSD"

- name: Get latest Jujutsu version for Linux
  ansible.builtin.uri:
    method: GET
    return_content: true
    url: https://formulae.brew.sh/api/formula/jj.json
  register: jujutsu_formula
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Create Jujutsu temporary directory for Linux
  ansible.builtin.tempfile:
    state: directory
  register: jujutsu_temp
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Set Jujutsu temporary directory permissions for Linux
  ansible.builtin.file:
    mode: "755"
    path: "{{ jujutsu_temp.path }}"
    state: directory
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Download Jujutsu for Linux
  ansible.builtin.unarchive:
    dest: "{{ jujutsu_temp.path }}"
    mode: "777"
    remote_src: true
    src: >-
      https://github.com/jj-vcs/jj/releases/download/v{{
      jujutsu_formula.json.versions.stable }}/jj-v{{
      jujutsu_formula.json.versions.stable }}-{{ jujutsu_arch
      }}-unknown-linux-musl.tar.gz
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Install Jujutsu for Linux
  ansible.builtin.copy:
    dest: /usr/local/bin/jj
    force: true
    mode: "755"
    remote_src: true
    src: "{{ jujutsu_temp.path }}/jj"
  become: true
  tags:
    - install
  when: ansible_facts.system == "Linux"

- name: Install Jujutsu for MacOS
  become: true
  become_user: "{{ brew_user }}"
  community.general.homebrew:
    name: jj
  tags:
    - install
  when: ansible_facts.system == "Darwin"

- name: Install Jujutsu for Windows
  community.windows.win_scoop:
    global: true
    name: jj
  tags:
    - install
  when: ansible_facts.system == "Win32NT"

- name: Create Jujutsu settings directory for Unix
  ansible.builtin.file:
    group: "{{ group_id }}"
    mode: "755"
    owner: "{{ user_id }}"
    path: "{{ user_home }}/.config/jj"
    state: directory
  become: true
  tags:
    - config
  when: ansible_facts.system != "Win32NT"

- name: Copy Jujutsu settings file for Unix
  ansible.builtin.template:
    dest: "{{ user_home }}/.config/jj/config.toml"
    force: true
    group: "{{ group_id }}"
    mode: "644"
    owner: "{{ user_id }}"
    src: config.toml.j2
  become: true
  tags:
    - config
  when: ansible_facts.system != "Win32NT"

- name: Create Jujutsu settings directory for Windows
  ansible.windows.win_file:
    path: "{{ user_home }}\\AppData\\Roaming\\jj"
    state: directory
  tags:
    - config
  when: ansible_facts.system == "Win32NT"

- name: Copy Jujutsu settings file for Windows
  ansible.windows.win_template:
    dest: "{{ user_home }}\\AppData\\Roaming\\jj\\config.toml"
    force: true
    src: config.toml.j2
  tags:
    - config
  when: ansible_facts.system == "Win32NT"

- name: Remove Jujutsu temporary directory for Linux
  ansible.builtin.file:
    path: "{{ jujutsu_temp.path }}"
    state: absent
  tags:
    - install
  when: ansible_facts.system == "Linux"
