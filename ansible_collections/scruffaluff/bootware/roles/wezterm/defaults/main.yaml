---
wezterm_package_:
  Darwin: wezterm@nightly
  Linux: "{{ 'wezterm-nightly' if system_pkg_mgr == 'apt' else 'wezterm' }}"
  Win32NT: wezterm-nightly
wezterm_font_size: "{{ terminal_font_size }}"
wezterm_package: >-
  {{ wezterm_package_.get(ansible_facts.system, 'wezterm') }}
wezterm_wayland: true
wezterm_window_decorations: "{{ not wayland_desktop }}"
