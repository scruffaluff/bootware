---
essential_linux_packages_:
  always:
    - acl
    - bzip2
    - ca-certificates
    - curl
    - findutils
    - gzip
    - tar
    - unzip
    - zstd
  apk:
    - 7zip
    - gnupg
    - openssl
    - openssl-dev
    - openssl-libs-static
    - which
    - xz
    - zip
  apt:
    - 7zip
    - apt-file
    - apt-transport-https
    - gnupg
    - libssl-dev
    - lsb-release
    - openssl
    - pbuilder
    - ubuntu-dev-tools
    - xz-utils
    - zip
  dnf:
    - 7zip
    - dnf-plugins-core
    - gnupg
    - openssl
    - openssl-devel
    - which
    - xz
    - zip
  opkg:
    - which
    - xz
  pacman:
    # Package base-devel is required for Yay to work with the AUR.
    - base-devel
    - gnupg
    - openssl
    - p7zip
    - which
    - xz
    - zip
  zypper:
    - 7zip
    - gnupg
    - libopenssl-devel
    - openssl
    - python3-dnf
    - which
    - xz
    - zip
essential_yay_arch_:
  amd64: x86_64
  arm64: aarch64
essential_linux_packages: >-
  {{ essential_linux_packages_.always +
  essential_linux_packages_.get(system_pkg_mgr, []) }}
essential_yay_arch: "{{ essential_yay_arch_[system_architecture] }}"
