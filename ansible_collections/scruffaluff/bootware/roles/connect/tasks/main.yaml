---
# Check based on https://stackoverflow.com/a/34480405.
- name: Query host for Windows shell information
  ansible.builtin.raw: >-
    (dir 2>&1 *`|echo commandprompt);&<# rem #>echo powershell
  changed_when: false
  failed_when: false
  register: connect_windows_shell

- name: Set connection variables if system is Windows
  ansible.builtin.set_fact:
    ansible_shell_type: >-
      {{ 'cmd' if 'commandprompt' in connect_windows_shell.stdout else
      'powershell' }}
    system_pkg_mgr: scoop
  when: >-
    connect_windows_shell.rc == 0 and ('commandprompt' in
    connect_windows_shell.stdout or 'powershell' in
    connect_windows_shell.stdout)

- name: Gather facts about system
  ansible.builtin.gather_facts: {}

- name: Set become method for Alpine
  ansible.builtin.set_fact:
    ansible_become_method: doas
  # Variable system_pkg_mgr cannot be used since it is not defined until after
  # this role.
  when: >-
    ansible_facts.system == "Linux" and ansible_facts.get("pkg_mgr", "") ==
    "apk"

- name: Mark role as executed to prevent reruns
  ansible.builtin.set_fact:
    cacheable: true
    connect_role_executed: true
