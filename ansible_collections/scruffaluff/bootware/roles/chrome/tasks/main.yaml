- name: Install Google Chrome for Arch
  become: true
  community.general.pacman:
    name: chromium
  tags:
    - install
  when: system_pkg_mgr == "pacman"

- name: Install Google Chrome for Debian
  ansible.builtin.apt:
    deb: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
  become: true
  tags:
    - install
  when: system_pkg_mgr == "apt" and system_architecture == "amd64"

- name: Add Google GPG key for Fedora
  ansible.builtin.rpm_key:
    key: https://dl.google.com/linux/linux_signing_key.pub
  become: true
  tags:
    - install
  when: >-
    system_pkg_mgr in ["dnf", "zypper"] and system_architecture == "amd64"

- name: Install Google Chrome for Fedora
  ansible.builtin.dnf:
    name: >-
      https://dl.google.com/linux/direct/google-chrome-stable_current_x86_64.rpm
  become: true
  tags:
    - install
  when: >-
    system_pkg_mgr == "dnf" and system_architecture == "amd64"

- name: Install Google Chrome for FreeBSD
  become: true
  community.general.pkgng:
    name: chromium
  tags:
    - install
  when: ansible_facts.system == "FreeBSD"

- name: Install Google Chrome for MacOS
  community.general.homebrew_cask:
    accept_external_apps: true
    name: google-chrome
    state: present
  tags:
    - install
  when: ansible_facts.system == "Darwin"

- name: Install Google Chrome for Windows
  community.windows.win_scoop:
    global: true
    name: googlechrome
  tags:
    - install
  when: ansible_facts.system == "Win32NT"

# Service directory must be created before file operations.
- name: Create Google Chrome services directories for Unix
  ansible.builtin.file:
    group: "{{ group_id }}"
    mode: "700"
    owner: "{{ user_id }}"
    path: "{{ item | dirname }}"
    state: directory
  become: true
  loop: "{{ chrome_services }}"
  tags:
    - install
  when: ansible_facts.system != "Win32NT"

# Services need to be removed before they can be blocked since Ansible cannot
# directly replace one file type with another, i.e. directory to file.
- name: Remove Google Chrome services for Unix
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop: "{{ chrome_services }}"
  tags:
    - install
  when: ansible_facts.system != "Win32NT"

- name: Block Google Chrome services for Unix
  ansible.builtin.file:
    group: nogroup
    mode: "000"
    owner: nobody
    path: "{{ item }}"
    state: touch
  become: true
  loop: "{{ chrome_services }}"
  tags:
    - install
  when: ansible_facts.system != "Win32NT"

- name: Set Google Chrome policies for MacOS
  ansible.builtin.command:
    cmd: defaults write com.google.Chrome {{ item.key }} -int {{ item.value }}
  become: true
  become_user: "{{ user_id }}"
  changed_when: true
  loop: "{{ chrome_policies | dict2items }}"
  tags:
    - config
  when: ansible_facts.system == "Darwin"

- name: Create Google Chrome policies directory for Unix
  ansible.builtin.file:
    mode: "755"
    path: /etc/opt/chrome/policies/managed
    state: directory
  become: true
  tags:
    - config
  when: ansible_facts.system not in ["Darwin", "Win32NT"]

- name: Set Google Chrome policies for Unix
  ansible.builtin.copy:
    content: "{{ chrome_policies | to_nice_json(indent=2) }}"
    dest: /etc/opt/chrome/policies/managed/managed_policies.json
    force: true
    mode: "644"
  become: true
  tags:
    - config
  when: ansible_facts.system not in ["Darwin", "Win32NT"]

- name: Set Google Chrome policies for Windows
  ansible.windows.win_regedit:
    data: "{{ item.value }}"
    name: "{{ item.key }}"
    path: HKLM:\SOFTWARE\Policies\Google\Chrome
    type: dword
  loop: "{{ chrome_policies | dict2items }}"
  tags:
    - config
  when: ansible_facts.system == "Win32NT"
