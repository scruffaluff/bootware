---
font_families:
  - check: FiraCode-Regular.ttf
    name: fira-code
    patterns:
      - FiraCode-*.ttf
    url: https://github.com/tonsky/FiraCode/releases/download/6.2/Fira_Code_v6.2.zip
  - check: FiraCodeNerdFont-Regular.ttf
    name: fira-code-nerd-font
    patterns:
      - FiraCodeNerdFont-*.ttf
    url: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FiraCode.zip
  - check: FiraMono-Regular.ttf
    name: fira-mono
    patterns:
      - FiraMono-*.ttf
    url: https://github.com/mozilla/Fira/archive/4.202.zip
  - check: FiraSans-Regular.ttf
    name: fira-sans
    patterns:
      - FiraSans-*.ttf
    url: https://github.com/mozilla/Fira/archive/4.202.zip
  - check: pt-mono-latin-400-normal.ttf
    name: pt-mono
    patterns:
      - pt-mono-*.ttf
    url: https://api.fontsource.org/v1/download/pt-mono
  - check: pt-sans-latin-400-normal.ttf
    name: pt-sans
    patterns:
      - pt-sans-*.ttf
    url: https://api.fontsource.org/v1/download/pt-sans
  - check: pt-serif-latin-400-normal.ttf
    name: pt-serif
    patterns:
      - pt-serif-*.ttf
    url: https://api.fontsource.org/v1/download/pt-serif
font_install: true
