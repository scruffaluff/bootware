---
zed_arch_:
  amd64: x86_64
  arm64: aarch64
zed_profiles_:
  helix:
    settings:
      helix_mode: true
zed_arch: "{{ zed_arch_[system_architecture] }}"
zed_config_path: >-
  {{ user_home + '\AppData\Roaming\Zed' if ansible_facts.system == 'Win32NT'
  else user_home + '/.config/zed' }}
zed_ctrl_key: "{{ 'cmd' if ansible_facts.system == 'Darwin' else 'ctrl' }}"
zed_extensions:
  colored-zed-icons-theme: true
  deno: true
  dockerfile: true
  emmet: true
  fish: true
  harper: true
  html: true
  jinja2: true
  just: true
  kdl: true
  latex: true
  lua: true
  log: true
  neocmake: true
  nu: true
  powershell: true
  rainbow-csv: true
  solarized: true
  toml: true
  typst: true
  vue: true
zed_font_size: "{{ editor_font_size }}"
